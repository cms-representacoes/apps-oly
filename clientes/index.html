<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0891B2">
<title>Clientes · CMS Representações</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" rel="preload" as="script">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
<style>
  :root{
    --brand:#0891B2;      /* ciano-tech */
    --brand-dark:#155E75;
    --brand-soft:#cffafe;
    --brand-text:#164e63;
    --line:#e2e8f0;
    --muted:#64748b;
    --text:#0f172a;
    --bg:#f6f7fb;
    --warn:#fef3c7;
    --warn-text:#92400e;
    --warn-border:#fbbf24;
    --success:#dcfce7;
    --success-text:#15803d;
    --danger:#fee2e2;
    --danger-text:#991b1b;
  }
  *,*::before,*::after{box-sizing:border-box}
  html, body{
    margin:0; padding:0;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior-y: contain;
  }
  body{ min-height:100vh; }

  /* === HEADER === */
  .header{
    position:sticky; top:0; z-index:30;
    background:linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
    color:#fff;
    padding:14px 14px;
    padding-top: calc(14px + env(safe-area-inset-top,0px));
    box-shadow:0 2px 8px rgba(8,145,178,.25);
  }
  .header-top{ display:flex; align-items:center; gap:10px; }
  .header-back{
    width:36px; height:36px; border-radius:9px;
    background:rgba(255,255,255,.15); border:none; color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-size:14px; cursor:pointer; flex-shrink:0;
  }
  .header-back:hover{ background:rgba(255,255,255,.25); }
  .header-ic{
    width:38px; height:38px; border-radius:9px;
    background:rgba(255,255,255,.2);
    display:flex; align-items:center; justify-content:center;
    font-size:17px; flex-shrink:0;
  }
  .header-title{ flex:1; min-width:0; }
  .header-title .l1{
    font-size:15px; font-weight:900;
    letter-spacing:-.2px;
  }
  .header-title .l2{
    font-size:10.5px; opacity:.85; margin-top:1px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .header-actions{ display:flex; gap:6px; }
  .header-btn{
    width:34px; height:34px; border-radius:9px;
    background:rgba(255,255,255,.18); border:none; color:#fff;
    cursor:pointer; font-size:13px;
    display:flex; align-items:center; justify-content:center;
  }
  .header-btn:hover{ background:rgba(255,255,255,.28); }

  .search-box{
    position:relative; margin-top:11px;
  }
  .search-box i{
    position:absolute; left:11px; top:50%;
    transform:translateY(-50%);
    color:#94a3b8; font-size:13px;
  }
  .search-box input{
    width:100%; padding:10px 38px 10px 32px;
    border-radius:11px; border:none;
    background:rgba(255,255,255,.95);
    font-size:13px; color:var(--text);
    outline:none;
    font-weight:500;
  }
  .search-box input:focus{ background:#fff; box-shadow:0 0 0 3px rgba(255,255,255,.3); }
  .search-clear{
    position:absolute; right:6px; top:50%;
    transform:translateY(-50%);
    background:none; border:none; color:#94a3b8;
    width:28px; height:28px; border-radius:50%;
    cursor:pointer; display:none;
    align-items:center; justify-content:center;
  }
  .search-clear.visible{ display:flex; }
  .search-clear:hover{ background:#f1f5f9; color:var(--text); }

  /* === FILTROS === */
  .filtros{
    background:#fff; padding:9px 12px;
    display:flex; gap:6px; overflow-x:auto;
    border-bottom:1px solid var(--line);
    scrollbar-width:none;
  }
  .filtros::-webkit-scrollbar{ display:none; }
  .chip{
    flex-shrink:0; background:#fff; color:var(--muted);
    border:1px solid var(--line);
    padding:6px 13px; border-radius:999px;
    font-size:11.5px; font-weight:700; cursor:pointer;
    display:inline-flex; align-items:center; gap:5px;
    white-space:nowrap; transition:all .15s;
  }
  .chip:hover{ border-color:#94a3b8; color:var(--text); }
  .chip.active{
    background:var(--brand); color:#fff; border-color:var(--brand);
    box-shadow:0 1px 4px rgba(8,145,178,.3);
  }
  .chip.avista{ background:var(--warn); color:var(--warn-text); border-color:var(--warn-border); }
  .chip.avista.active{ background:var(--warn-border); color:#fff; }
  .chip .cnt{
    background:rgba(0,0,0,.08); color:inherit;
    padding:0 6px; border-radius:8px;
    font-size:10px; font-weight:800;
  }
  .chip.active .cnt{ background:rgba(255,255,255,.25); }

  /* === LISTA === */
  .lista-wrap{
    padding:11px 11px 100px;
  }
  .lista-info{
    font-size:11px; color:var(--muted);
    font-weight:600; margin-bottom:9px;
    padding:0 4px;
  }
  .lista-info b{ color:var(--text); font-weight:900; }

  .card{
    background:#fff; border:1px solid var(--line);
    border-radius:12px; padding:12px;
    margin-bottom:8px;
    transition: all .15s;
  }
  .card.aberto{
    border:1.5px solid var(--brand);
    padding:11px;
    box-shadow:0 2px 10px rgba(8,145,178,.12);
  }

  .card-head{
    display:flex; align-items:flex-start; gap:9px;
    margin-bottom:9px;
  }
  .card-avatar{
    flex-shrink:0; width:38px; height:38px;
    border-radius:9px;
    display:flex; align-items:center; justify-content:center;
    font-size:17px; font-weight:900;
    background:var(--brand-soft); color:var(--brand-text);
    letter-spacing:0;
  }
  .card.aberto .card-avatar{
    background:var(--brand); color:#fff;
  }
  .card-avatar.avista{ background:var(--warn); color:var(--warn-text); font-size:14px; }
  .card-head-info{ flex:1; min-width:0; }
  .card-tags{
    display:flex; align-items:center; gap:5px;
    flex-wrap:wrap; margin-bottom:3px;
  }
  .tag-cod{
    background:var(--text); color:#fff;
    font-size:13px; font-weight:900;
    padding:4px 11px; border-radius:6px;
    letter-spacing:.4px;
    cursor:pointer;
    display:inline-flex; align-items:center; gap:6px;
    transition:background .15s;
    border:none;
    font-family:inherit;
    line-height:1;
  }
  .tag-cod:hover{ background:#1e293b; }
  .tag-cod.copiado{ background:var(--success-text); }
  .tag-cod .copy-mini{ font-size:10px; opacity:.7; }
  .tag-avista{
    background:var(--warn); color:var(--warn-text);
    font-size:8.5px; font-weight:900;
    padding:2px 7px; border-radius:5px;
    letter-spacing:.3px;
  }
  .card-nome{
    font-size:13px; font-weight:900;
    color:var(--text); line-height:1.25;
    letter-spacing:-.2px;
  }
  .card-chev{
    flex-shrink:0;
    background:#f1f5f9; border:none; color:var(--muted);
    width:28px; height:28px; border-radius:7px;
    cursor:pointer; font-size:11px;
    display:flex; align-items:center; justify-content:center;
    transition:all .15s;
  }
  .card-chev:hover{ background:#e2e8f0; color:var(--text); }
  .card.aberto .card-chev{ background:var(--brand); color:#fff; }

  /* === LINHAS DE INFO === */
  .info-row{
    display:flex; align-items:center; gap:8px;
    padding:7px 0;
    border-top:1px solid #f1f5f9;
  }
  .info-row:first-of-type{ border-top:none; padding-top:0; }
  .info-ic{
    width:24px; height:24px; background:#f1f5f9;
    border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; color:var(--muted); font-size:11px;
  }
  .info-data{ flex:1; min-width:0; }
  .info-l{
    font-size:9px; color:#94a3b8;
    font-weight:800; text-transform:uppercase;
    letter-spacing:.3px;
  }
  .info-v{
    color:var(--text); font-weight:700; font-size:12px;
    margin-top:1px; line-height:1.2;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .info-v.cidade b{ font-weight:900; }

  .btn-copy{
    background:transparent; border:none; color:#94a3b8;
    cursor:pointer; padding:7px 9px;
    border-radius:6px; font-size:12px;
    flex-shrink:0; transition:all .15s;
  }
  .btn-copy:hover{ background:#f1f5f9; color:var(--brand); }
  .btn-copy.copiado{ color:var(--success-text); background:var(--success); }

  /* === DETALHES === */
  .detalhes{
    margin-top:10px; padding-top:10px;
    border-top:1px solid var(--line);
  }
  .det-titulo{
    font-size:9px; color:#94a3b8;
    font-weight:800; text-transform:uppercase;
    letter-spacing:.4px; margin-bottom:4px;
    padding-left:2px;
  }

  /* === BOTÃO EXPANDIR === */
  .btn-expandir{
    width:100%; background:#f8fafc;
    border:1px solid var(--line);
    color:var(--muted);
    font-size:11px; font-weight:800;
    padding:8px; border-radius:8px;
    cursor:pointer; margin-top:8px;
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    transition:all .15s;
    font-family:inherit;
  }
  .btn-expandir:hover{ background:#f1f5f9; border-color:#94a3b8; color:var(--text); }
  .card.aberto .btn-expandir{
    background:var(--brand); color:#fff; border-color:var(--brand);
  }
  .card.aberto .btn-expandir:hover{ background:var(--brand-dark); border-color:var(--brand-dark); }

  /* === LOADING / EMPTY === */
  .estado{
    padding:60px 20px; text-align:center; color:var(--muted);
    min-height:60vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .estado i{ font-size:36px; margin-bottom:12px; color:#cbd5e1; }
  .estado h3{
    font-size:15px; font-weight:900; color:var(--text);
    margin:0 0 6px;
  }
  .estado p{ font-size:12px; margin:0; max-width:280px; line-height:1.5; }

  /* === SELETOR DE VENDEDOR === */
  .seletor-bg{
    position:fixed; inset:0; z-index:120;
    background:rgba(15,23,42,.55); backdrop-filter:blur(2px);
    display:flex; align-items:center; justify-content:center;
    padding:20px;
  }
  .seletor-bg.hidden{ display:none; }
  .seletor-card{
    background:#fff; border-radius:16px;
    width:100%; max-width:380px;
    overflow:hidden;
    box-shadow:0 12px 40px rgba(0,0,0,.3);
    animation:slideUp .25s ease-out;
  }
  @keyframes slideUp{
    from{ transform:translateY(20px); opacity:0; }
    to{ transform:translateY(0); opacity:1; }
  }
  .seletor-head{
    padding:18px 20px;
    background:linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
    color:#fff;
  }
  .seletor-head .ic{
    width:44px; height:44px; border-radius:11px;
    background:rgba(255,255,255,.22);
    display:flex; align-items:center; justify-content:center;
    font-size:20px; margin-bottom:10px;
  }
  .seletor-head h2{
    font-size:17px; font-weight:900; margin:0;
    letter-spacing:-.2px;
  }
  .seletor-head p{
    font-size:11.5px; opacity:.85; margin:3px 0 0; line-height:1.4;
  }
  .seletor-body{ padding:16px 20px 20px; }
  .seletor-body label{
    display:block; font-size:10.5px;
    font-weight:800; color:var(--muted);
    text-transform:uppercase; letter-spacing:.4px;
    margin-bottom:6px;
  }
  .seletor-body select{
    width:100%; padding:11px 12px;
    border:1.5px solid var(--line);
    border-radius:10px;
    font-size:13px; font-weight:600;
    color:var(--text); background:#fff;
    outline:none;
  }
  .seletor-body select:focus{ border-color:var(--brand); }
  .seletor-foot{
    padding:0 20px 20px;
    display:flex; gap:8px;
  }
  .btn-primary{
    flex:1; padding:11px;
    background:var(--brand); color:#fff;
    border:none; border-radius:10px;
    font-size:13px; font-weight:800;
    cursor:pointer; font-family:inherit;
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    transition:background .15s;
  }
  .btn-primary:hover{ background:var(--brand-dark); }
  .btn-primary:disabled{ opacity:.6; cursor:not-allowed; }

  /* === MENU DROPDOWN === */
  .menu-bg{
    position:fixed; inset:0; z-index:110;
    background:rgba(0,0,0,.25);
    display:none;
  }
  .menu-bg.visivel{ display:block; }
  .menu-card{
    position:fixed; top:60px; right:14px;
    background:#fff; border-radius:11px;
    box-shadow:0 8px 24px rgba(0,0,0,.18);
    min-width:200px;
    overflow:hidden; z-index:111;
    display:none;
    animation:menuIn .15s ease-out;
  }
  .menu-card.visivel{ display:block; }
  @keyframes menuIn{
    from{ transform:translateY(-5px); opacity:0; }
    to{ transform:translateY(0); opacity:1; }
  }
  .menu-item{
    width:100%; background:none; border:none;
    padding:11px 14px; text-align:left;
    font-size:12.5px; font-weight:600;
    color:var(--text); cursor:pointer;
    display:flex; align-items:center; gap:9px;
    font-family:inherit;
    border-bottom:1px solid #f1f5f9;
  }
  .menu-item:last-child{ border-bottom:none; }
  .menu-item:hover{ background:#f8fafc; }
  .menu-item i{ color:var(--muted); width:14px; text-align:center; }
  .menu-item.danger{ color:var(--danger-text); }
  .menu-item.danger i{ color:var(--danger-text); }

  /* === TOAST === */
  .toast-wrap{
    position:fixed; top:calc(80px + env(safe-area-inset-top,0px));
    left:0; right:0;
    display:flex; flex-direction:column; align-items:center; gap:8px;
    z-index:300; pointer-events:none;
  }
  .toast{
    background:var(--text); color:#fff;
    padding:9px 16px; border-radius:9px;
    font-size:12px; font-weight:700;
    box-shadow:0 4px 12px rgba(0,0,0,.18);
    animation:toastIn .25s ease-out;
    max-width:90%;
  }
  .toast.success{ background:var(--success-text); }
  .toast.error{ background:var(--danger-text); }
  @keyframes toastIn{
    from{ transform:translateY(-10px); opacity:0; }
    to{ transform:translateY(0); opacity:1; }
  }

  /* === TABLET / DESKTOP === */
  @media(min-width:640px){
    .lista-wrap{ max-width:560px; margin:0 auto; padding:14px 14px 100px; }
    .header-top, .search-box, .filtros{ max-width:560px; margin-left:auto; margin-right:auto; }
    .filtros{ padding-left:14px; padding-right:14px; }
  }
  @media(min-width:900px){
    .lista-wrap{ max-width:640px; }
    .header-top, .search-box, .filtros{ max-width:640px; }
  }
</style>
</head>
<body>

<div id="toastWrap" class="toast-wrap"></div>

<!-- === HEADER === -->
<div class="header">
  <div class="header-top">
    <button class="header-back" onclick="voltar()" title="Voltar">
      <i class="fa-solid fa-arrow-left"></i>
    </button>
    <div class="header-ic"><i class="fa-solid fa-users"></i></div>
    <div class="header-title">
      <div class="l1">Clientes</div>
      <div class="l2" id="subtitulo">Carregando...</div>
    </div>
    <div class="header-actions">
      <button class="header-btn" onclick="toggleMenu()" title="Menu">
        <i class="fa-solid fa-ellipsis-vertical"></i>
      </button>
    </div>
  </div>
  <div class="search-box">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input id="busca" type="text" placeholder="Buscar por código, nome, cidade ou CNPJ..." oninput="aplicarFiltros()">
    <button id="searchClear" class="search-clear" onclick="limparBusca()" title="Limpar">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>
</div>

<!-- === FILTROS === -->
<div id="filtros" class="filtros">
  <!-- preenchido dinamicamente -->
</div>

<!-- === LISTA === -->
<div class="lista-wrap">
  <div id="listaInfo" class="lista-info"></div>
  <div id="lista"></div>
</div>

<!-- === MENU === -->
<div id="menuBg" class="menu-bg" onclick="toggleMenu()"></div>
<div id="menuCard" class="menu-card">
  <button class="menu-item" onclick="trocarVendedor()">
    <i class="fa-solid fa-arrow-right-arrow-left"></i>
    Trocar vendedor
  </button>
  <button class="menu-item" onclick="recarregar()">
    <i class="fa-solid fa-rotate"></i>
    Recarregar lista
  </button>
  <button class="menu-item" onclick="abrirAdmin()">
    <i class="fa-solid fa-cloud-arrow-up"></i>
    Subir nova lista (admin)
  </button>
</div>

<!-- === SELETOR DE VENDEDOR === -->
<div id="seletorBg" class="seletor-bg hidden">
  <div class="seletor-card">
    <div class="seletor-head">
      <div class="ic"><i class="fa-solid fa-id-badge"></i></div>
      <h2>Quem é você?</h2>
      <p>Escolha seu nome para ver a sua lista de clientes.</p>
    </div>
    <div class="seletor-body">
      <label>VENDEDOR</label>
      <select id="seletorSelect">
        <option value="">— Selecione —</option>
      </select>
    </div>
    <div class="seletor-foot">
      <button class="btn-primary" onclick="confirmarVendedor()">
        <i class="fa-solid fa-arrow-right"></i> Ver meus clientes
      </button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════════════════
const WORKER_URL = 'https://repasse-worker-cms.marcosrep-cms.workers.dev';
const VENDEDOR_LS = 'clientes_vendedor_v1';
const $ = id => document.getElementById(id);

// Lista oficial de vendedores (mesma da vitrine compartilhada)
const VENDEDORES = [
  { codigo:'114611',  nome:'JORGE'    },
  { codigo:'109839',  nome:'MARIANA'  },
  { codigo:'1333497', nome:'RAFAEL'   },
  { codigo:'25471',   nome:'WILLAME'  },
  { codigo:'25745',   nome:'LEANDRO'  },
  { codigo:'3616654', nome:'MARCOS'   }
];

const STATE = {
  vendedor: null,
  vendedorNome: '',
  clientes: [],
  filtros: {
    estado: '',        // '', 'MA', 'PA', etc
    avista: false,
    busca: ''
  },
  expandidos: new Set()  // IDs de clientes abertos
};

// ═══════════════════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════════════════
function safeHtml(v){
  return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fixEncoding(s){
  // Corrige "Nï¿½o" → "Não"  (encoding errado vindo do XLSX)
  if(!s) return '';
  return String(s).replace(/ï¿½/g, 'ã').replace(/\uFFFD/g, 'ã');
}

function showToast(msg, type='info'){
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  $('toastWrap').appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .2s'; }, 2200);
  setTimeout(() => t.remove(), 2500);
}

// Inicial pra avatar — 1 letra
function iniciais(nome){
  if(!nome) return '?';
  const s = String(nome).replace(/[^a-zA-ZÀ-ÿ]/g,'').trim();
  return (s.charAt(0) || '?').toUpperCase();
}

// Formata CNPJ: 12158606000139 → 12.158.606/0001-39
function formatCNPJ(v){
  const s = String(v||'').replace(/\D/g,'');
  if(s.length !== 14) return v || '';
  return `${s.slice(0,2)}.${s.slice(2,5)}.${s.slice(5,8)}/${s.slice(8,12)}-${s.slice(12)}`;
}

// Formata CPF: 12345678901 → 123.456.789-01
function formatCPF(v){
  const s = String(v||'').replace(/\D/g,'');
  if(s.length !== 11) return v || '';
  return `${s.slice(0,3)}.${s.slice(3,6)}.${s.slice(6,9)}-${s.slice(9)}`;
}

// Detecta se é CPF ou CNPJ e formata
function formatDoc(v){
  const s = String(v||'').replace(/\D/g,'');
  if(s.length === 14) return formatCNPJ(s);
  if(s.length === 11) return formatCPF(s);
  return v || '';
}

// Formata telefone: 99 991591314 → (99) 99159-1314
function formatTel(v){
  const s = String(v||'').replace(/\D/g,'');
  if(s.length === 11) return `(${s.slice(0,2)}) ${s.slice(2,7)}-${s.slice(7)}`;
  if(s.length === 10) return `(${s.slice(0,2)}) ${s.slice(2,6)}-${s.slice(6)}`;
  return v || '';
}

// Normaliza string para busca (sem acento, lowercase)
function norm(s){
  return String(s||'').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function isAvista(c){
  const v = fixEncoding(c.avista || c.AVISTA || '').trim().toLowerCase();
  return v === 'sim';
}

async function copiar(texto, btn){
  if(!texto) return;
  try{
    await navigator.clipboard.writeText(String(texto));
    if(btn){
      const orig = btn.innerHTML;
      btn.classList.add('copiado');
      btn.innerHTML = '<i class="fa-solid fa-check"></i>';
      setTimeout(() => {
        btn.classList.remove('copiado');
        btn.innerHTML = orig;
      }, 1400);
    }
    showToast('Copiado!', 'success');
  }catch(e){
    showToast('Não foi possível copiar', 'error');
  }
}
window.copiar = copiar;

// ═══════════════════════════════════════════════════════════════════════════
// SELETOR DE VENDEDOR
// ═══════════════════════════════════════════════════════════════════════════
function mostrarSeletor(){
  const sel = $('seletorSelect');
  sel.innerHTML = '<option value="">— Selecione —</option>' +
    VENDEDORES.map(v => `<option value="${v.codigo}">${safeHtml(v.codigo)} – ${safeHtml(v.nome)}</option>`).join('');
  $('seletorBg').classList.remove('hidden');
}

function confirmarVendedor(){
  const v = $('seletorSelect').value;
  if(!v){ showToast('Selecione um vendedor', 'error'); return; }
  localStorage.setItem(VENDEDOR_LS, v);
  STATE.vendedor = v;
  const item = VENDEDORES.find(x => x.codigo === v);
  STATE.vendedorNome = item ? item.nome : v;
  $('seletorBg').classList.add('hidden');
  carregarClientes();
}

function trocarVendedor(){
  toggleMenu();
  localStorage.removeItem(VENDEDOR_LS);
  STATE.vendedor = null;
  STATE.clientes = [];
  mostrarSeletor();
}

// ═══════════════════════════════════════════════════════════════════════════
// MENU
// ═══════════════════════════════════════════════════════════════════════════
function toggleMenu(){
  $('menuBg').classList.toggle('visivel');
  $('menuCard').classList.toggle('visivel');
}

function recarregar(){
  toggleMenu();
  carregarClientes();
}

function abrirAdmin(){
  toggleMenu();
  location.href = 'admin/';
}

// ═══════════════════════════════════════════════════════════════════════════
// CARREGAR DADOS
// ═══════════════════════════════════════════════════════════════════════════
async function carregarClientes(){
  $('lista').innerHTML = `
    <div class="estado">
      <i class="fa-solid fa-circle-notch fa-spin"></i>
      <h3>Carregando...</h3>
      <p>Buscando sua lista de clientes.</p>
    </div>`;
  $('subtitulo').textContent = `${STATE.vendedorNome} · carregando...`;

  try{
    const res = await fetch(WORKER_URL, {
      method:'PATCH',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'getClientes', vendedor: STATE.vendedor })
    });
    const json = await res.json();
    if(!json.success) throw new Error('falha');
    STATE.clientes = Array.isArray(json.clientes) ? json.clientes : [];
    $('subtitulo').textContent = `${STATE.vendedorNome} · ${STATE.clientes.length} cadastrado${STATE.clientes.length!==1?'s':''}`;

    if(STATE.clientes.length === 0){
      $('lista').innerHTML = `
        <div class="estado">
          <i class="fa-regular fa-folder-open"></i>
          <h3>Nenhum cliente cadastrado</h3>
          <p>Sua lista ainda não foi importada. Peça ao administrador para subir a base.</p>
        </div>`;
      $('filtros').innerHTML = '';
      $('listaInfo').textContent = '';
      return;
    }

    montarFiltros();
    aplicarFiltros();
  }catch(e){
    console.error(e);
    $('lista').innerHTML = `
      <div class="estado">
        <i class="fa-solid fa-triangle-exclamation" style="color:#dc2626"></i>
        <h3>Erro ao carregar</h3>
        <p>Não foi possível conectar. Tente novamente.</p>
      </div>`;
    showToast('Erro ao carregar clientes', 'error');
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// FILTROS
// ═══════════════════════════════════════════════════════════════════════════
function montarFiltros(){
  // Conta por estado
  const porEstado = {};
  let avistaCnt = 0;
  for(const c of STATE.clientes){
    const e = String(c.estado || c.ESTADO || '').trim().toUpperCase();
    if(e) porEstado[e] = (porEstado[e] || 0) + 1;
    if(isAvista(c)) avistaCnt++;
  }
  const estados = Object.entries(porEstado)
    .sort((a,b) => b[1] - a[1])
    .map(([uf, n]) => ({ uf, n }));

  const wrap = $('filtros');
  let html = `
    <button class="chip ${STATE.filtros.estado===''&&!STATE.filtros.avista?'active':''}" onclick="setFiltro('estado','')">
      Todos <span class="cnt">${STATE.clientes.length}</span>
    </button>
  `;
  for(const e of estados){
    html += `
      <button class="chip ${STATE.filtros.estado===e.uf?'active':''}" onclick="setFiltro('estado','${safeHtml(e.uf)}')">
        ${safeHtml(e.uf)} <span class="cnt">${e.n}</span>
      </button>`;
  }
  if(avistaCnt > 0){
    html += `
      <button class="chip avista ${STATE.filtros.avista?'active':''}" onclick="setFiltro('avista', !STATE.filtros.avista)">
        💰 À vista <span class="cnt">${avistaCnt}</span>
      </button>`;
  }
  wrap.innerHTML = html;
}

function setFiltro(tipo, valor){
  if(tipo === 'estado'){ STATE.filtros.estado = valor; STATE.filtros.avista = false; }
  if(tipo === 'avista'){ STATE.filtros.avista = !!valor; STATE.filtros.estado = ''; }
  montarFiltros();
  aplicarFiltros();
}

function limparBusca(){
  $('busca').value = '';
  STATE.filtros.busca = '';
  $('searchClear').classList.remove('visible');
  aplicarFiltros();
}

function aplicarFiltros(){
  const q = norm($('busca').value.trim());
  STATE.filtros.busca = q;
  $('searchClear').classList.toggle('visible', q.length > 0);

  const filtrados = STATE.clientes.filter(c => {
    // Estado
    if(STATE.filtros.estado && String(c.estado||c.ESTADO||'').toUpperCase() !== STATE.filtros.estado) return false;
    // À vista
    if(STATE.filtros.avista && !isAvista(c)) return false;
    // Busca
    if(q){
      const bag = norm(
        `${c.codigo||''} ${c.nome||c.razaoSocial||''} ${c.cidade||''} ${c.cnpj||c.documento||''} ${c.estado||''}`
      );
      if(!bag.includes(q)) return false;
    }
    return true;
  });

  renderLista(filtrados);
}

// ═══════════════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════════════
function renderLista(itens){
  const wrap = $('lista');
  if(!itens.length){
    wrap.innerHTML = `
      <div class="estado">
        <i class="fa-regular fa-circle-question"></i>
        <h3>Nenhum cliente encontrado</h3>
        <p>Tente outro termo de busca ou ajuste os filtros.</p>
      </div>`;
    $('listaInfo').textContent = '';
    return;
  }

  // Ordena por nome
  const ord = itens.slice().sort((a,b) =>
    String(a.nome||a.razaoSocial||'').localeCompare(String(b.nome||b.razaoSocial||''))
  );

  $('listaInfo').innerHTML = `<b>${ord.length}</b> cliente${ord.length!==1?'s':''} ${STATE.filtros.busca?'encontrado'+(ord.length!==1?'s':''):''}`;

  wrap.innerHTML = ord.map(c => cardHtml(c)).join('');
}

function cardHtml(c){
  const id = String(c.codigo || '').trim();
  const aberto = STATE.expandidos.has(id);
  const avista = isAvista(c);
  const nome = c.nome || c.razaoSocial || '—';
  const cidade = c.cidade || c.CIDADE || '—';
  const estado = c.estado || c.ESTADO || '';
  const doc = c.cnpj || c.documento || '';
  const docFmt = formatDoc(doc);
  const tel = formatTel(c.telefone || c.TELEFONE || '');
  const emailNfe = c.emailNfe || c.EMAIL_NFE || '';
  const emailBan = c.emailBancario || c.EMAIL_BANCARIO || '';

  const detalhesHtml = aberto ? `
    <div class="detalhes">
      <div class="det-titulo">CONTATO</div>
      ${tel ? `
        <div class="info-row">
          <div class="info-ic"><i class="fa-solid fa-phone"></i></div>
          <div class="info-data">
            <div class="info-l">Telefone</div>
            <div class="info-v">${safeHtml(tel)}</div>
          </div>
          <button class="btn-copy" onclick="event.stopPropagation();copiar('${safeHtml(tel)}',this)" title="Copiar"><i class="fa-regular fa-copy"></i></button>
        </div>` : ''}
      ${emailNfe ? `
        <div class="info-row">
          <div class="info-ic"><i class="fa-solid fa-envelope"></i></div>
          <div class="info-data">
            <div class="info-l">Email NFE</div>
            <div class="info-v">${safeHtml(emailNfe)}</div>
          </div>
          <button class="btn-copy" onclick="event.stopPropagation();copiar('${safeHtml(emailNfe)}',this)" title="Copiar"><i class="fa-regular fa-copy"></i></button>
        </div>` : ''}
      ${emailBan && emailBan !== emailNfe ? `
        <div class="info-row">
          <div class="info-ic"><i class="fa-solid fa-envelope"></i></div>
          <div class="info-data">
            <div class="info-l">Email Retorno Bancário</div>
            <div class="info-v">${safeHtml(emailBan)}</div>
          </div>
          <button class="btn-copy" onclick="event.stopPropagation();copiar('${safeHtml(emailBan)}',this)" title="Copiar"><i class="fa-regular fa-copy"></i></button>
        </div>` : ''}
      <div class="info-row">
        <div class="info-ic"><i class="fa-solid fa-cash-register"></i></div>
        <div class="info-data">
          <div class="info-l">Condição</div>
          <div class="info-v">${avista ? 'Somente à vista' : 'Aceita prazo'}</div>
        </div>
      </div>
    </div>` : '';

  return `
    <div class="card ${aberto?'aberto':''}" data-id="${safeHtml(id)}">
      <div class="card-head">
        <div class="card-avatar ${avista?'avista':''}">${avista ? '💰' : safeHtml(iniciais(nome))}</div>
        <div class="card-head-info">
          <div class="card-tags">
            <button class="tag-cod" onclick="event.stopPropagation();copiar('${safeHtml(id)}',this)" title="Copiar código">
              #${safeHtml(id)} <i class="fa-regular fa-copy copy-mini"></i>
            </button>
            ${avista ? '<span class="tag-avista">À VISTA</span>' : ''}
          </div>
          <div class="card-nome">${safeHtml(nome)}</div>
        </div>
        <button class="card-chev" onclick="toggleCard('${safeHtml(id)}')">
          <i class="fa-solid fa-chevron-${aberto?'up':'down'}"></i>
        </button>
      </div>

      <div class="info-row">
        <div class="info-ic"><i class="fa-solid fa-location-dot"></i></div>
        <div class="info-data">
          <div class="info-l">Cidade</div>
          <div class="info-v cidade">${safeHtml(cidade)}${estado?` · <b>${safeHtml(estado)}</b>`:''}</div>
        </div>
        <button class="btn-copy" onclick="event.stopPropagation();copiar('${safeHtml(cidade + (estado?' - '+estado:''))}',this)" title="Copiar"><i class="fa-regular fa-copy"></i></button>
      </div>
      ${docFmt ? `
        <div class="info-row">
          <div class="info-ic"><i class="fa-solid fa-id-card"></i></div>
          <div class="info-data">
            <div class="info-l">${String(doc).replace(/\D/g,'').length===11?'CPF':'CNPJ'}</div>
            <div class="info-v">${safeHtml(docFmt)}</div>
          </div>
          <button class="btn-copy" onclick="event.stopPropagation();copiar('${safeHtml(docFmt)}',this)" title="Copiar"><i class="fa-regular fa-copy"></i></button>
        </div>` : ''}

      ${detalhesHtml}

      <button class="btn-expandir" onclick="toggleCard('${safeHtml(id)}')">
        <i class="fa-solid fa-chevron-${aberto?'up':'down'}"></i> ${aberto?'Ocultar detalhes':'Ver mais informações'}
      </button>
    </div>`;
}

function toggleCard(id){
  if(STATE.expandidos.has(id)) STATE.expandidos.delete(id);
  else STATE.expandidos.add(id);
  aplicarFiltros();
}
window.toggleCard = toggleCard;

// ═══════════════════════════════════════════════════════════════════════════
// VOLTAR
// ═══════════════════════════════════════════════════════════════════════════
function voltar(){
  // Volta pro portal do vendedor
  const path = location.pathname;
  // Se estiver em /Catalogo-Olympikus/clientes/ — volta uma pasta
  const partes = path.split('/').filter(Boolean);
  if(partes.length >= 2){
    location.href = '/' + partes.slice(0, partes.length - 1).join('/') + '/';
  } else {
    history.back();
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════
function init(){
  const v = localStorage.getItem(VENDEDOR_LS);
  if(v){
    STATE.vendedor = v;
    const item = VENDEDORES.find(x => x.codigo === v);
    STATE.vendedorNome = item ? item.nome : v;
    carregarClientes();
  } else {
    mostrarSeletor();
  }
}
init();
</script>
