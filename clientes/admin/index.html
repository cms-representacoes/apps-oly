<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0891B2">
<title>Admin Clientes · CMS Representações</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root{
    --brand:#0891B2;
    --brand-dark:#155E75;
    --brand-soft:#cffafe;
    --line:#e2e8f0;
    --muted:#64748b;
    --text:#0f172a;
    --bg:#f6f7fb;
    --warn:#fef3c7;
    --warn-text:#92400e;
    --success:#dcfce7;
    --success-text:#15803d;
    --danger:#fee2e2;
    --danger-text:#991b1b;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text)}
  body{min-height:100vh; padding-bottom:40px;}

  .header{
    background:linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
    color:#fff; padding:18px 20px;
  }
  .header h1{
    font-size:18px; font-weight:900; margin:0;
    display:flex; align-items:center; gap:10px;
  }
  .header .ic{
    width:36px; height:36px; border-radius:9px;
    background:rgba(255,255,255,.18);
    display:flex; align-items:center; justify-content:center;
  }
  .header p{ font-size:11.5px; opacity:.88; margin:5px 0 0 46px; }

  .wrap{ max-width:680px; margin:0 auto; padding:18px; }

  .card{
    background:#fff; border:1px solid var(--line);
    border-radius:12px; padding:18px;
    margin-bottom:14px;
    box-shadow:0 1px 3px rgba(0,0,0,.04);
  }
  .card h2{
    font-size:14px; font-weight:900; margin:0 0 12px;
    color:var(--text);
    display:flex; align-items:center; gap:8px;
  }
  .card h2 .num{
    width:24px; height:24px; border-radius:50%;
    background:var(--brand); color:#fff;
    display:inline-flex; align-items:center; justify-content:center;
    font-size:11px;
  }

  label{
    display:block; font-size:10.5px;
    font-weight:800; color:var(--muted);
    text-transform:uppercase; letter-spacing:.4px;
    margin-bottom:6px;
  }

  select, input[type="file"]{
    width:100%; padding:11px 12px;
    border:1.5px solid var(--line);
    border-radius:10px;
    font-size:13px; font-weight:600;
    color:var(--text); background:#fff;
    outline:none; font-family:inherit;
  }
  select:focus{ border-color:var(--brand); }

  .upload-area{
    border:2px dashed var(--line);
    background:#f8fafc;
    border-radius:11px; padding:24px;
    text-align:center; cursor:pointer;
    transition:all .15s;
  }
  .upload-area:hover{ border-color:var(--brand); background:var(--brand-soft); }
  .upload-area i{ font-size:32px; color:var(--brand); margin-bottom:8px; }
  .upload-area p{ font-size:12px; color:var(--muted); margin:5px 0 0; }
  .upload-area b{ color:var(--text); display:block; font-size:13px; }

  .file-info{
    background:var(--brand-soft); color:var(--brand-dark);
    border-radius:9px; padding:11px 14px;
    font-size:12.5px; font-weight:700;
    display:flex; align-items:center; gap:8px;
    margin-top:10px;
  }
  .file-info i{ font-size:14px; }

  .preview-box{
    margin-top:12px;
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
  }
  .preview-box-head{
    background:#f8fafc; padding:9px 12px;
    font-size:11.5px; font-weight:800;
    color:var(--text);
    display:flex; align-items:center; gap:7px;
    border-bottom:1px solid var(--line);
  }
  .preview-box-head b{ color:var(--brand); }

  .preview-row{
    padding:7px 12px; font-size:11px;
    color:var(--text); display:flex; gap:8px;
    border-bottom:1px solid #f1f5f9;
  }
  .preview-row:last-child{ border-bottom:none; }
  .preview-row .cod{
    background:var(--text); color:#fff;
    font-size:9.5px; font-weight:900;
    padding:1.5px 6px; border-radius:4px;
    flex-shrink:0;
  }
  .preview-row .nome{ flex:1; font-weight:700; }
  .preview-row .cid{ color:var(--muted); font-size:10.5px; }

  .preview-mais{
    padding:8px 12px; text-align:center;
    background:#f8fafc; font-size:10.5px;
    color:var(--muted); font-style:italic;
  }

  .map-cols{
    background:#f8fafc; border-radius:10px;
    padding:11px 13px;
    margin-top:10px;
    font-size:11.5px;
  }
  .map-cols b{ color:var(--text); }
  .map-cols .det{ color:var(--muted); margin-top:3px; font-size:10.5px; line-height:1.5; }

  .alert{
    border-radius:9px; padding:10px 13px;
    font-size:11.5px; font-weight:700;
    margin-top:10px;
    display:flex; align-items:center; gap:8px;
    line-height:1.4;
  }
  .alert.error{ background:var(--danger); color:var(--danger-text); }
  .alert.warn{ background:var(--warn); color:var(--warn-text); }
  .alert.success{ background:var(--success); color:var(--success-text); }

  .btn-primary{
    width:100%; padding:13px;
    background:var(--brand); color:#fff;
    border:none; border-radius:11px;
    font-size:13.5px; font-weight:800;
    cursor:pointer; font-family:inherit;
    display:inline-flex; align-items:center; justify-content:center; gap:7px;
    transition:all .15s;
  }
  .btn-primary:hover{ background:var(--brand-dark); }
  .btn-primary:disabled{ opacity:.5; cursor:not-allowed; }

  .token-box{ display:none; }

  .toast-wrap{
    position:fixed; top:20px; left:0; right:0;
    display:flex; flex-direction:column; align-items:center; gap:8px;
    z-index:300; pointer-events:none;
  }
  .toast{
    background:var(--text); color:#fff;
    padding:10px 18px; border-radius:9px;
    font-size:12.5px; font-weight:700;
    box-shadow:0 4px 12px rgba(0,0,0,.18);
  }
  .toast.success{ background:var(--success-text); }
  .toast.error{ background:var(--danger-text); }
</style>
</head>
<body>

<div class="toast-wrap" id="toastWrap"></div>

<div class="header">
  <h1>
    <span class="ic"><i class="fa-solid fa-database"></i></span>
    Admin · Clientes
  </h1>
  <p>Importar listagem de clientes por vendedor</p>
</div>

<div class="wrap">

  <div class="token-box">
    <label><i class="fa-solid fa-key"></i> ADMIN TOKEN</label>
    <input id="adminToken" type="password" placeholder="Cole o token de admin aqui">
  </div>

  <div class="card">
    <h2><span class="num">1</span> Escolha o vendedor</h2>
    <label>VENDEDOR DESTINO</label>
    <select id="vendedorSelect">
      <option value="">— Selecione —</option>
    </select>
  </div>

  <div class="card">
    <h2><span class="num">2</span> Envie a planilha</h2>
    <label>ARQUIVO .XLSX</label>
    <div class="upload-area" onclick="document.getElementById('inputXlsx').click()">
      <i class="fa-solid fa-cloud-arrow-up"></i>
      <b>Clique para selecionar</b>
      <p>Planilha com cabeçalhos: CLIENTE, CPF/CNPJ, TELEFONE, CIDADE, ESTADO, EMAIL NFE, EMAIL RETORNO BANCARIO, SOMENTE AVISTA</p>
    </div>
    <input id="inputXlsx" type="file" accept=".xlsx,.xls" style="display:none" onchange="lerXlsx(this.files[0])">
    <div id="fileInfo"></div>

    <div class="map-cols" id="mapCols" style="display:none">
      <b>Colunas detectadas:</b>
      <div class="det" id="mapColsLista"></div>
    </div>

    <div id="preview"></div>
  </div>

  <div class="card">
    <h2><span class="num">3</span> Salvar no servidor</h2>
    <button id="btnSalvar" class="btn-primary" onclick="salvar()" disabled>
      <i class="fa-solid fa-cloud-arrow-up"></i> Enviar lista para o servidor
    </button>
    <div id="resultado"></div>
  </div>

</div>

<script>
const WORKER_URL = 'https://repasse-worker-cms.marcosrep-cms.workers.dev';
const ADMIN_TOKEN_LS = 'admin_token_v1';
const $ = id => document.getElementById(id);

const VENDEDORES = [
  { codigo:'114611',  nome:'JORGE'    },
  { codigo:'109839',  nome:'MARIANA'  },
  { codigo:'1333497', nome:'RAFAEL'   },
  { codigo:'25471',   nome:'WILLAME'  },
  { codigo:'25745',   nome:'LEANDRO'  },
  { codigo:'3616654', nome:'MARCOS'   }
];

let _clientes = [];

function showToast(msg, type='info'){
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  $('toastWrap').appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function safeHtml(v){ return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Init
function init(){
  // popula select de vendedores
  const sel = $('vendedorSelect');
  sel.innerHTML = '<option value="">— Selecione —</option>' +
    VENDEDORES.map(v => `<option value="${v.codigo}">${v.codigo} – ${v.nome}</option>`).join('');
  sel.addEventListener('change', verificarPodeEnviar);

  // restaura token salvo
  const t = localStorage.getItem(ADMIN_TOKEN_LS);
  if(t) $('adminToken').value = t;
  $('adminToken').addEventListener('input', () => {
    localStorage.setItem(ADMIN_TOKEN_LS, $('adminToken').value);
  });
}
init();

// Lê XLSX
async function lerXlsx(file){
  if(!file) return;
  $('fileInfo').innerHTML = `<div class="file-info"><i class="fa-solid fa-spinner fa-spin"></i> Lendo ${safeHtml(file.name)}...</div>`;
  $('preview').innerHTML = '';
  $('mapCols').style.display = 'none';

  try{
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type:'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { defval:null });

    if(!rows.length){
      $('fileInfo').innerHTML = `<div class="alert error"><i class="fa-solid fa-triangle-exclamation"></i> Arquivo vazio</div>`;
      return;
    }

    // Detecta colunas
    const cols = Object.keys(rows[0]);
    const mapa = mapearColunas(cols);

    $('mapColsLista').innerHTML = `
      ${mapa.codigo  ? `<div><b>Código:</b> "${mapa.codigo}"</div>` : '<div style="color:#dc2626"><b>Código:</b> NÃO ENCONTRADO</div>'}
      ${mapa.nome    ? `<div><b>Nome:</b> "${mapa.nome}"</div>`     : '<div style="color:#dc2626"><b>Nome:</b> NÃO ENCONTRADO</div>'}
      ${mapa.cnpj    ? `<div><b>CPF/CNPJ:</b> "${mapa.cnpj}"</div>` : ''}
      ${mapa.tel     ? `<div><b>Telefone:</b> "${mapa.tel}"</div>`  : ''}
      ${mapa.cidade  ? `<div><b>Cidade:</b> "${mapa.cidade}"</div>` : ''}
      ${mapa.estado  ? `<div><b>Estado:</b> "${mapa.estado}"</div>` : ''}
      ${mapa.emailNfe? `<div><b>Email NFE:</b> "${mapa.emailNfe}"</div>` : ''}
      ${mapa.emailBan? `<div><b>Email Bancário:</b> "${mapa.emailBan}"</div>` : ''}
      ${mapa.avista  ? `<div><b>À Vista:</b> "${mapa.avista}"</div>` : ''}
    `;
    $('mapCols').style.display = 'block';

    if(!mapa.codigo || !mapa.nome){
      $('fileInfo').innerHTML = `<div class="alert error"><i class="fa-solid fa-triangle-exclamation"></i> Não foi possível detectar colunas obrigatórias (Código e Nome). Verifique os cabeçalhos.</div>`;
      return;
    }

    // Converte para formato padronizado
    _clientes = rows.map(row => ({
      codigo:       String(row[mapa.codigo] || '').trim(),
      nome:         String(row[mapa.nome] || '').trim(),
      cnpj:         String(row[mapa.cnpj] || '').trim(),
      telefone:     String(row[mapa.tel] || '').trim(),
      cidade:       String(row[mapa.cidade] || '').trim(),
      estado:       String(row[mapa.estado] || '').trim().toUpperCase(),
      emailNfe:     String(row[mapa.emailNfe] || '').trim().toLowerCase(),
      emailBancario:String(row[mapa.emailBan] || '').trim().toLowerCase(),
      avista:       fixEncoding(String(row[mapa.avista] || '').trim())
    })).filter(c => c.codigo && c.nome);

    $('fileInfo').innerHTML = `
      <div class="file-info">
        <i class="fa-regular fa-circle-check"></i>
        ${safeHtml(file.name)} · ${_clientes.length} cliente(s) detectado(s)
      </div>`;

    renderPreview();
    verificarPodeEnviar();
  }catch(e){
    console.error(e);
    $('fileInfo').innerHTML = `<div class="alert error"><i class="fa-solid fa-triangle-exclamation"></i> Erro ao ler arquivo: ${e.message}</div>`;
  }
}

// Mapeia colunas tolerante a variações
function mapearColunas(cols){
  const norm = s => String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');
  const find = (...termos) => cols.find(c => {
    const n = norm(c);
    return termos.some(t => n === t || n.includes(t));
  });
  return {
    codigo:   find('codigo','codcliente','cod','clientecodigo','cliente') || cols[0], // 1ª coluna CLIENTE = código
    nome:     cols.filter(c => /cliente/i.test(c))[1] || find('razaosocial','razao','nomefantasia','nome'),
    cnpj:     find('cpfcnpj','cnpj','cpf','documento'),
    tel:      find('telefone','tel','fone','celular','contato'),
    cidade:   find('cidade','municipio','localidade'),
    estado:   find('estado','uf'),
    emailNfe: find('emailnfe','emailnotafiscal','emailnf','email') || cols.find(c => /email/i.test(c)),
    emailBan: find('emailretornobancario','emailbancario','emailretorno','emailcobranca'),
    avista:   find('somenteavista','avista','somentevista')
  };
}

function fixEncoding(s){
  return String(s||'').replace(/ï¿½/g, 'ã').replace(/\uFFFD/g, 'ã');
}

function renderPreview(){
  if(!_clientes.length){ $('preview').innerHTML = ''; return; }
  const mostrar = _clientes.slice(0, 5);
  $('preview').innerHTML = `
    <div class="preview-box">
      <div class="preview-box-head">
        <i class="fa-regular fa-eye"></i> Pré-visualização (<b>${_clientes.length}</b> clientes)
      </div>
      ${mostrar.map(c => `
        <div class="preview-row">
          <span class="cod">#${safeHtml(c.codigo)}</span>
          <span class="nome">${safeHtml(c.nome)}</span>
          <span class="cid">${safeHtml(c.cidade)}${c.estado?'/'+safeHtml(c.estado):''}</span>
        </div>`).join('')}
      ${_clientes.length > 5 ? `<div class="preview-mais">+ ${_clientes.length - 5} clientes não mostrados</div>` : ''}
    </div>
  `;
}

function verificarPodeEnviar(){
  $('btnSalvar').disabled = !(_clientes.length > 0 && $('vendedorSelect').value);
}

async function salvar(){
  const vendedor = $('vendedorSelect').value;
  const token = $('adminToken').value.trim();
  if(!vendedor){ showToast('Selecione o vendedor', 'error'); return; }
  if(!_clientes.length){ showToast('Nenhum cliente para enviar', 'error'); return; }

  const vendItem = VENDEDORES.find(v => v.codigo === vendedor);
  if(!confirm(`Enviar ${_clientes.length} cliente(s) para o vendedor ${vendItem.nome} (${vendItem.codigo})?\n\n⚠️ Isso SUBSTITUI a lista atual deste vendedor.`)){
    return;
  }

  const btn = $('btnSalvar');
  const prev = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Enviando...';

  try{
    const res = await fetch(WORKER_URL, {
      method:'PATCH',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'saveClientes', vendedor, data: _clientes })
    });
    const json = await res.json();
    if(!res.ok || !json.success) throw new Error(json.erro || res.status);
    $('resultado').innerHTML = `
      <div class="alert success" style="margin-top:12px">
        <i class="fa-solid fa-circle-check"></i>
        ${json.total} cliente(s) salvos para ${vendItem.nome}
      </div>`;
    showToast(`${json.total} clientes enviados!`, 'success');
  }catch(e){
    console.error(e);
    $('resultado').innerHTML = `
      <div class="alert error" style="margin-top:12px">
        <i class="fa-solid fa-triangle-exclamation"></i> Erro: ${safeHtml(e.message || 'falha')}
      </div>`;
    showToast('Erro ao enviar', 'error');
  }finally{
    btn.disabled = false;
    btn.innerHTML = prev;
  }
}
</script>
</body>
</html>
