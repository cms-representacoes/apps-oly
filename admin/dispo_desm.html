<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Desmembramento • Repasse Olympikus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{
      --brand:#2836d4; --brand-soft:rgba(40,54,212,.10);
      --line:#e2e8f0; --bg:#f6f7fb; --card:#fff;
      --success:#15803d; --success-soft:#dcfce7;
      --warning:#b45309; --warning-soft:#fef3c7;
      --danger:#b91c1c; --danger-soft:#fee2e2;
    }
    *{ box-sizing:border-box; }
    body{ font-family:Inter,system-ui,sans-serif; background:var(--bg); color:#0f172a; margin:0; }

    .page-header{ background:#fff; border-bottom:1px solid var(--line); padding:16px 24px; display:flex; align-items:center; gap:16px; }
    .btn-back{ display:inline-flex; align-items:center; gap:6px; border:1px solid var(--line); border-radius:999px; padding:6px 14px; font-size:13px; font-weight:700; color:#475569; background:#fff; cursor:pointer; text-decoration:none; }
    .btn-back:hover{ background:#f8fafc; }

    .card{ background:#fff; border-radius:24px; border:1px solid var(--line); padding:24px; }

    table{ width:100%; border-collapse:collapse; font-size:13px; }
    thead th{ background:#f8fafc; color:#475569; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.06em; padding:10px 14px; border-bottom:1px solid var(--line); white-space:nowrap; position:sticky; top:0; z-index:1; }
    tbody td{ padding:11px 14px; border-bottom:1px solid #edf2f7; vertical-align:middle; }
    tbody tr:last-child td{ border-bottom:none; }
    tbody tr:hover td{ background:#f8fafc; }

    .chip{ display:inline-flex; align-items:center; gap:4px; border-radius:999px; padding:3px 10px; font-size:12px; font-weight:600; }
    .chip-aprov{ background:var(--success-soft); color:var(--success); }
    .chip-pend{ background:var(--warning-soft); color:var(--warning); }
    .chip-canc{ background:var(--danger-soft); color:var(--danger); }

    .status-select{ border:1px solid var(--line); border-radius:999px; padding:5px 12px; font-size:12px; font-weight:700; cursor:pointer; outline:none; appearance:none; -webkit-appearance:none; transition:background .12s; }
    .status-select.st-pendente{ background:#fef3c7; color:#b45309; border-color:#fde68a; }
    .status-select.st-finalizado{ background:#dcfce7; color:#15803d; border-color:#bbf7d0; }

    .toast-wrap{ position:fixed; top:20px; right:20px; z-index:999; display:flex; flex-direction:column; gap:8px; }
    .toast{ background:#1e293b; color:#fff; border-radius:14px; padding:10px 18px; font-size:13px; font-weight:600; box-shadow:0 8px 24px rgba(0,0,0,.2); }
    .toast.success{ background:#15803d; }
    .toast.error{ background:#b91c1c; }
    .toast.info{ background:#1d4ed8; }
  </style>
</head>
<body>
<div id="toastWrap" class="toast-wrap"></div>

<div class="page-header">
  <a href="./dispo.html" onclick="event.preventDefault(); sessionStorage.removeItem('desm_row'); sessionStorage.removeItem('desm_linhas'); sessionStorage.removeItem('desm_key'); sessionStorage.removeItem('desm_desmembramentos'); window.location.replace('./dispo.html');" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Voltar ao DISPO</a>
  <div>
    <div class="text-xs font-bold text-slate-400 uppercase tracking-wide">Controle de desmembramento</div>
    <div id="pageTitle" class="text-xl font-extrabold"></div>
  </div>
</div>

<div class="max-w-[1300px] mx-auto px-6 py-6 space-y-4">

  <div id="metaCard" class="card">
    <div class="flex flex-wrap gap-6 text-sm">
      <div><span class="text-slate-400 font-semibold">Código</span><div id="metaCodigo" class="font-extrabold mt-0.5"></div></div>
      <div><span class="text-slate-400 font-semibold">GCI</span><div id="metaGci" class="font-extrabold text-[var(--brand)] mt-0.5"></div></div>
      <div><span class="text-slate-400 font-semibold">Cor</span><div id="metaCor" class="font-extrabold mt-0.5"></div></div>
      <div><span class="text-slate-400 font-semibold">Prev. Fat.</span><div id="metaPrevFat" class="font-extrabold mt-0.5"></div></div>
    </div>
  </div>

  <div class="card" style="padding:0;overflow:hidden">
    <div class="overflow-auto">
      <table>
        <thead>
          <tr>
            <th>EBM</th>
            <th>GCI</th>
            <th>Cliente</th>
            <th>Prazo</th>
            <th>Campanha</th>
            <th>Descrição</th>
            <th>Cor</th>
            <th class="text-right">Qtde</th>
            <th>Prev Fat</th>
            <th>Status Pedido</th>
            <th>Situação</th>
          </tr>
        </thead>
        <tbody id="desmBody"></tbody>
      </table>
    </div>
    <div id="emptyState" class="hidden py-16 text-center text-slate-400">
      <i class="fa-solid fa-inbox text-4xl mb-3 block"></i>
      <div class="font-semibold">Nenhum pedido encontrado para este produto.</div>
    </div>
  </div>

  <div class="flex items-center justify-between flex-wrap gap-3">
    <div id="rodape" class="text-xs text-slate-400 font-semibold"></div>
    <button id="btnSalvar" onclick="salvar()" class="rounded-2xl bg-[var(--brand)] px-6 py-3 text-sm font-extrabold text-white flex items-center gap-2 disabled:opacity-50">
      <i class="fa-solid fa-floppy-disk"></i> Salvar alterações
    </button>
  </div>

</div>

<script>
const WORKER_URL = 'https://repasse-worker-cms.marcosrep-cms.workers.dev';

function showToast(msg, type='info'){
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.getElementById('toastWrap').appendChild(t);
  setTimeout(()=>t.remove(), 3500);
}

function formatDate(value){
  if(!value) return '—';
  if(typeof value === 'string' && value.includes('T')) return new Date(value).toLocaleDateString('pt-BR');
  if(typeof value === 'number' || (typeof value === 'string' && /^\d{4,6}$/.test(value))){
    const n = Number(value);
    if(n > 40000 && n < 60000){
      const d = new Date(Date.UTC(1899,11,30));
      d.setUTCDate(d.getUTCDate() + n);
      return d.toLocaleDateString('pt-BR');
    }
  }
  const d = new Date(value);
  return isNaN(d) ? String(value) : d.toLocaleDateString('pt-BR');
}

function statusChip(status){
  const s = (status||'').toLowerCase();
  if(s.includes('aprovado'))  return `<span class="chip chip-aprov"><i class="fa-solid fa-circle-check"></i> Aprovado</span>`;
  if(s.includes('cancelado')) return `<span class="chip chip-canc"><i class="fa-solid fa-circle-xmark"></i> Cancelado</span>`;
  return `<span class="chip chip-pend"><i class="fa-solid fa-clock"></i> Pendente</span>`;
}

function onStatusChange(sel){
  sel.className = `status-select st-${sel.value.toLowerCase()}`;
}

// ── INIT ─────────────────────────────────────────────────────────────────────

const row       = JSON.parse(sessionStorage.getItem('desm_row') || 'null');
const linhas    = JSON.parse(sessionStorage.getItem('desm_linhas') || '[]');
const desmKey   = sessionStorage.getItem('desm_key') || '';
let desmembramentos = JSON.parse(sessionStorage.getItem('desm_desmembramentos') || '{}');

if(!row){
  document.querySelector('.max-w-\\[1300px\\]').innerHTML = '<div class="card text-center py-16 text-slate-400"><i class="fa-solid fa-triangle-exclamation text-4xl mb-3 block"></i><div class="font-semibold">Nenhum produto selecionado. <a href="./dispo.html" class="text-[var(--brand)]">Voltar ao DISPO</a></div></div>';
} else {
  document.getElementById('pageTitle').textContent = `${row.produto} · ${row.cor}`;
  document.getElementById('metaCodigo').textContent = row.codigo || '—';
  document.getElementById('metaGci').textContent = row.gci || '—';
  document.getElementById('metaCor').textContent = row.cor || '—';
  document.getElementById('metaPrevFat').textContent = formatDate(row.dataEntrega);

  const saved = desmembramentos[desmKey] || {};

  if(!linhas.length){
    document.getElementById('emptyState').classList.remove('hidden');
    document.getElementById('rodape').textContent = '0 linhas';
  } else {
    const total = linhas.reduce((s,l)=>s+Number(l.qtde||0),0);
    document.getElementById('rodape').textContent = `${linhas.length} linha${linhas.length!==1?'s':''} · ${total} unidades`;

    document.getElementById('desmBody').innerHTML = linhas.map(l => {
      const st = saved[l.lineKey] || l.desmStatus || 'Pendente';
      return `<tr>
        <td class="text-slate-500 font-semibold">${l.ebm||'—'}</td>
        <td class="font-extrabold text-[#2836d4]">${l.gci||'—'}</td>
        <td class="font-extrabold">${l.cliente||'—'}</td>
        <td class="text-slate-500 font-semibold whitespace-nowrap">${l.prazo||'—'}</td>
        <td class="text-slate-500 font-semibold">${l.campanha||'—'}</td>
        <td class="font-extrabold">${l.produto||'—'}</td>
        <td class="text-slate-500 font-semibold">${l.cor||'—'}</td>
        <td class="text-right font-extrabold">${l.qtde||0}</td>
        <td class="text-slate-500 font-semibold whitespace-nowrap">${l.prevFat||'—'}</td>
        <td>${statusChip(l.orderStatus)}</td>
        <td>
          <select class="status-select st-${st.toLowerCase()}"
            data-line-key="${l.lineKey}"
            onchange="onStatusChange(this)">
            <option value="Pendente"   ${st==='Pendente'  ?'selected':''}>Pendente</option>
            <option value="Finalizado" ${st==='Finalizado'?'selected':''}>Finalizado</option>
          </select>
        </td>
      </tr>`;
    }).join('');
  }
}

async function salvar(){
  const btn = document.getElementById('btnSalvar');
  const prev = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Salvando...';

  try{
    // Lê estado atual dos selects
    const selects = document.querySelectorAll('.status-select');
    const saved = desmembramentos[desmKey] || {};
    selects.forEach(sel => { saved[sel.dataset.lineKey] = sel.value; });
    desmembramentos[desmKey] = saved;

    const res = await fetch(WORKER_URL, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'save', data: desmembramentos })
    });
    if(!res.ok) throw new Error(`Worker PATCH falhou (${res.status})`);
    const result = await res.json();
    if(!result.success) throw new Error(result.error || 'Erro ao salvar');

    // Atualiza sessionStorage
    sessionStorage.setItem('desm_desmembramentos', JSON.stringify(desmembramentos));
    showToast('Salvo com sucesso!', 'success');
  }catch(err){
    console.error(err);
    showToast('Erro ao salvar. Tente novamente.', 'error');
  }finally{
    btn.disabled = false;
    btn.innerHTML = prev;
  }
}
</script>
</body>
</html>
