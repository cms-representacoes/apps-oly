<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Admin • Repasse Olympikus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root{--bg:#f6f7fb;--card:#fff;--text:#0f172a;--line:#e2e8f0;--brand:#2836d4;--brand-soft:rgba(40,54,212,.10);--shadow:0 18px 42px rgba(15,23,42,.08)}
    *{box-sizing:border-box} body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .chip{display:inline-flex;align-items:center;gap:.4rem;border-radius:999px;padding:.42rem .78rem;font-size:12px;font-weight:800}
    .chip-blue{background:var(--brand-soft);color:var(--brand)} .chip-gray{background:#eef2f7;color:#334155}
    .shadow-card{box-shadow:var(--shadow)} .focus-ring:focus-visible{outline:none;box-shadow:0 0 0 4px rgba(40,54,212,.15)}
    .grade-pill{min-width:34px;border:1px solid var(--line);border-radius:10px;padding:4px 5px;background:#fff;text-align:center}
    .grade-size{display:block;font-size:10px;line-height:1;color:#64748b;font-weight:700}
    .grade-qty{display:block;font-size:11px;line-height:1.15;color:var(--brand);font-weight:800;margin-top:3px}
  </style>
</head>
<body>
  <main class="min-h-screen p-4 sm:p-6">
    <section id="loginScreen" class="mx-auto max-w-md pt-16 sm:pt-24">
      <div class="rounded-[32px] border border-slate-200 bg-white p-6 sm:p-8 shadow-card">
        <div class="mx-auto h-14 w-14 rounded-2xl bg-[var(--brand-soft)] text-[var(--brand)] flex items-center justify-center text-2xl">
          <i class="fa-solid fa-shield-halved"></i>
        </div>
        <h1 class="mt-5 text-2xl font-extrabold">Painel Administrativo</h1>
        <p class="mt-2 text-sm text-slate-500">Entre com a senha para visualizar pedidos enviados pelos vendedores.</p>
        <div class="mt-5">
          <label class="text-xs font-bold text-slate-500">Senha</label>
          <input id="adminPassword" type="password" class="focus-ring mt-1 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm font-semibold" placeholder="Digite a senha" />
        </div>
        <button id="btnAdminLogin" class="focus-ring mt-5 w-full rounded-2xl bg-[var(--brand)] px-4 py-3 text-sm font-extrabold text-white">Entrar</button>
        <div class="mt-3 text-xs text-slate-400">Cole o mesmo token do vendedor neste arquivo para sincronização real.</div>
      </div>
    </section>

    <section id="adminApp" class="hidden mx-auto max-w-7xl">
      <header class="rounded-[32px] border border-slate-200 bg-white p-4 sm:p-5 shadow-card">
        <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
          <div>
            <div class="text-xs font-bold text-slate-500">Gestão</div>
            <div class="text-2xl sm:text-3xl font-extrabold">Pedidos de repasse</div>
          </div>
          <div class="flex flex-wrap items-center gap-2">
            <button id="btnRefresh" class="focus-ring rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-bold text-slate-700"><i class="fa-solid fa-rotate-right mr-2"></i>Atualizar</button>
            <div class="flex items-center gap-2 rounded-full border border-slate-200 bg-white px-3 py-2 min-w-[220px]">
              <i class="fa-solid fa-magnifying-glass text-slate-400"></i>
              <input id="adminSearch" class="focus-ring w-full bg-transparent text-sm outline-none" placeholder="Buscar pedido, cliente ou preposto" />
            </div>
            <select id="adminStatusFilter" class="focus-ring rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-bold">
              <option value="">Todos os status</option>
              <option value="Pendente">Pendente</option>
              <option value="Em análise">Em análise</option>
              <option value="Aprovado">Aprovado</option>
              <option value="Rejeitado">Rejeitado</option>
              <option value="Atendido parcialmente">Atendido parcialmente</option>
            </select>
            <button id="btnLogout" class="focus-ring rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-bold text-slate-700">Sair</button>
          </div>
        </div>
      </header>

      <section class="mt-4 grid grid-cols-1 xl:grid-cols-[380px_minmax(0,1fr)] gap-4">
        <div class="rounded-[28px] border border-slate-200 bg-white p-4 shadow-card">
          <div class="flex items-center justify-between gap-2">
            <div class="text-lg font-extrabold">Lista de pedidos</div>
            <div id="listCount" class="chip chip-gray">0 pedidos</div>
          </div>
          <div id="ordersEmpty" class="hidden mt-4 rounded-2xl border border-slate-200 bg-slate-50 p-6 text-center text-slate-500">Nenhum pedido encontrado.</div>
          <div id="adminOrdersList" class="mt-4 space-y-3"></div>
        </div>

        <div class="rounded-[28px] border border-slate-200 bg-white p-4 shadow-card">
          <div id="detailEmpty" class="rounded-2xl border border-slate-200 bg-slate-50 p-10 text-center text-slate-500">Selecione um pedido para visualizar os detalhes.</div>
          <div id="adminOrderDetail" class="hidden"></div>
        </div>
      </section>
    </section>
  </main>

<script>
const GITHUB_CONFIG = { owner:'marcosrepcms-max', repo:'Catalogo-Olympikus', branch:'main', token:'COLE_AQUI_SEU_TOKEN', ordersPath:'data/pedidos.json' };
const STORAGE_KEYS = { adminAuth:'repasse_admin_auth_v1' };
const ADMIN_PASSWORD = 'cmsrepasse';
const STATUS_OPTIONS = ['Pendente','Em análise','Aprovado','Rejeitado','Atendido parcialmente'];
const STATE = { orders: [], filtered: [], selectedId: null };
const $ = (id)=>document.getElementById(id);
function safeHtml(v){ return String(v ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;'); }
function gradeHtml(grade=[]){ return grade.map(g=>`<div class="grade-pill"><span class="grade-size">${safeHtml(g.size)}</span><span class="grade-qty">${safeHtml(g.qty)}</span></div>`).join(''); }
function hasGithubConfig(){ return Boolean(GITHUB_CONFIG.token && GITHUB_CONFIG.token !== 'COLE_AQUI_SEU_TOKEN'); }
async function githubGetJson(path){
  const url = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${path}?ref=${encodeURIComponent(GITHUB_CONFIG.branch)}`;
  const headers = { 'Accept':'application/vnd.github+json' };
  if(hasGithubConfig()) headers['Authorization'] = `Bearer ${GITHUB_CONFIG.token}`;
  const res = await fetch(url, { headers });
  if(res.status === 404) return { exists:false, sha:null, data:[] };
  if(!res.ok) throw new Error(`GitHub GET falhou (${res.status})`);
  const payload = await res.json();
  const decoded = decodeURIComponent(escape(atob(payload.content.replace(/
/g,''))));
  return { exists:true, sha:payload.sha, data: JSON.parse(decoded) };
}
async function githubPutJson(path, data, message){
  if(!hasGithubConfig()) throw new Error('Token GitHub não configurado.');
  const current = await githubGetJson(path);
  const url = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${path}`;
  const body = { message, content:btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))), branch:GITHUB_CONFIG.branch };
  if(current.sha) body.sha = current.sha;
  const res = await fetch(url, { method:'PUT', headers:{ 'Accept':'application/vnd.github+json','Authorization':`Bearer ${GITHUB_CONFIG.token}`,'Content-Type':'application/json' }, body:JSON.stringify(body) });
  if(!res.ok){ const txt=await res.text(); throw new Error(`GitHub PUT falhou (${res.status}): ${txt.slice(0,160)}`); }
  return res.json();
}
function applyAuthUI(){
  const ok = localStorage.getItem(STORAGE_KEYS.adminAuth) === 'ok';
  $('loginScreen').classList.toggle('hidden', ok);
  $('adminApp').classList.toggle('hidden', !ok);
  if(ok){ loadAdmin(); }
}
async function loadAdmin(){
  try{
    const remote = await githubGetJson(GITHUB_CONFIG.ordersPath);
    STATE.orders = Array.isArray(remote.data) ? remote.data.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)) : [];
    applyFilters();
  }catch(err){
    console.error(err);
    alert('Não foi possível carregar os pedidos do GitHub. Confira o token e o caminho do arquivo.');
  }
}
function applyFilters(){
  const q = ($('adminSearch').value || '').toLowerCase().trim();
  const status = $('adminStatusFilter').value;
  STATE.filtered = STATE.orders.filter(order=>{
    const hay = `${order.id} ${order.clienteCodigo} ${order.preposto?.nome || ''} ${order.preposto?.codigo || ''} ${order.prazo || ''} ${order.campanha || ''}`.toLowerCase();
    return (!q || hay.includes(q)) && (!status || order.status === status);
  });
  $('listCount').textContent = `${STATE.filtered.length} pedido${STATE.filtered.length===1?'':'s'}`;
  renderList();
  if(!STATE.selectedId && STATE.filtered[0]) STATE.selectedId = STATE.filtered[0].id;
  if(STATE.selectedId && !STATE.filtered.find(o=>o.id === STATE.selectedId)) STATE.selectedId = STATE.filtered[0]?.id || null;
  renderDetail();
}
function renderList(){
  $('ordersEmpty').classList.toggle('hidden', STATE.filtered.length !== 0);
  $('adminOrdersList').innerHTML = STATE.filtered.map(order=>{
    const active = order.id === STATE.selectedId;
    const created = new Date(order.createdAt);
    return `
      <button data-order-id="${safeHtml(order.id)}" class="w-full text-left rounded-[24px] border ${active ? 'border-[var(--brand)] bg-[rgba(40,54,212,.05)]' : 'border-slate-200 bg-slate-50'} p-4">
        <div class="flex items-start justify-between gap-3">
          <div class="min-w-0">
            <div class="text-sm font-extrabold truncate">${safeHtml(order.id)}</div>
            <div class="mt-1 text-xs text-slate-500">${created.toLocaleDateString('pt-BR')} • ${created.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</div>
          </div>
          <span class="chip chip-gray">${safeHtml(order.status)}</span>
        </div>
        <div class="mt-3 flex flex-wrap gap-2 text-xs font-bold">
          <span class="chip chip-blue">Cliente ${safeHtml(order.clienteCodigo)}</span>
          <span class="chip chip-gray">${safeHtml(order.preposto?.nome || '')}</span>
        </div>
      </button>
    `;
  }).join('');
  $('adminOrdersList').querySelectorAll('[data-order-id]').forEach(btn=>btn.addEventListener('click', ()=>{ STATE.selectedId = btn.dataset.orderId; renderList(); renderDetail(); }));
}
function renderDetail(){
  const order = STATE.filtered.find(o=>o.id === STATE.selectedId);
  $('detailEmpty').classList.toggle('hidden', !!order);
  $('adminOrderDetail').classList.toggle('hidden', !order);
  if(!order){ $('adminOrderDetail').innerHTML = ''; return; }
  const created = new Date(order.createdAt);
  $('adminOrderDetail').innerHTML = `
    <div class="flex flex-col gap-4">
      <div class="flex flex-col lg:flex-row lg:items-start lg:justify-between gap-4">
        <div>
          <div class="text-lg sm:text-xl font-extrabold">${safeHtml(order.id)}</div>
          <div class="mt-1 text-sm text-slate-500">${created.toLocaleDateString('pt-BR')} às ${created.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</div>
          <div class="mt-3 flex flex-wrap gap-2">
            <span class="chip chip-blue">${safeHtml(order.preposto?.codigo || '')} - ${safeHtml(order.preposto?.nome || '')}</span>
            <span class="chip chip-gray">Cliente ${safeHtml(order.clienteCodigo)}</span>
            <span class="chip chip-gray">${safeHtml(order.prazo || '—')}</span>
            ${order.campanha ? `<span class="chip chip-blue">${safeHtml(order.campanha)}</span>` : ''}
          </div>
        </div>
        <div class="rounded-[24px] border border-slate-200 bg-slate-50 p-4 min-w-[220px]">
          <div class="text-xs font-bold text-slate-500">Status do pedido</div>
          <select id="detailStatus" class="focus-ring mt-2 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-bold">
            ${STATUS_OPTIONS.map(s=>`<option value="${safeHtml(s)}" ${s===order.status?'selected':''}>${safeHtml(s)}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="rounded-[24px] border border-slate-200 bg-slate-50 p-4"><div class="text-xs font-bold text-slate-500">Volumes</div><div class="mt-1 text-xl font-extrabold">${order.totals?.packs || 0}</div></div>
        <div class="rounded-[24px] border border-slate-200 bg-slate-50 p-4"><div class="text-xs font-bold text-slate-500">Itens</div><div class="mt-1 text-xl font-extrabold">${order.totals?.units || 0}</div></div>
        <div class="rounded-[24px] border border-slate-200 bg-slate-50 p-4"><div class="text-xs font-bold text-slate-500">Linhas</div><div class="mt-1 text-xl font-extrabold">${order.items?.length || 0}</div></div>
      </div>
      ${order.observacoes ? `<div class="rounded-[24px] border border-slate-200 bg-slate-50 p-4"><div class="text-xs font-bold text-slate-500">Observações</div><div class="mt-2 text-sm font-semibold text-slate-700">${safeHtml(order.observacoes)}</div></div>` : ''}
      <div class="rounded-[24px] border border-slate-200 bg-slate-50 p-4">
        <div class="text-lg font-extrabold">Itens do pedido</div>
        <div class="mt-4 space-y-3">
          ${order.items.map(item=>`
            <div class="rounded-[22px] border border-slate-200 bg-white p-4">
              <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-3">
                <div>
                  <div class="font-extrabold">${safeHtml(item.produto)}</div>
                  <div class="mt-1 text-xs text-slate-500">${safeHtml(item.codigo)} · ${safeHtml(item.cor)} · Prev. Faturamento ${safeHtml(item.prevFaturamento || '—')}</div>
                </div>
                <div class="text-right text-sm font-extrabold">
                  ${item.mode === 'boxed' ? `${item.amount} caixa${item.amount > 1 ? 's' : ''}` : `${item.amount} unidade${item.amount > 1 ? 's' : ''}`}
                  <div class="mt-1 text-xs text-slate-500">${safeHtml(item.totalUnits || 0)} itens</div>
                </div>
              </div>
              ${item.grade?.length ? `<div class="mt-3 flex flex-wrap gap-2">${gradeHtml(item.grade)}</div>` : ''}
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
  $('detailStatus').addEventListener('change', e=>updateStatus(order.id, e.target.value));
}
async function updateStatus(id, status){
  try{
    const idx = STATE.orders.findIndex(o=>o.id === id);
    if(idx === -1) return;
    STATE.orders[idx].status = status;
    STATE.orders[idx].updatedAt = new Date().toISOString();
    await githubPutJson(GITHUB_CONFIG.ordersPath, STATE.orders, `Atualiza status ${id} para ${status}`);
    applyFilters();
  }catch(err){
    console.error(err);
    alert('Não foi possível atualizar o status no GitHub.');
    await loadAdmin();
  }
}
$('btnAdminLogin').addEventListener('click', ()=>{
  if($('adminPassword').value !== ADMIN_PASSWORD){ alert('Senha inválida.'); return; }
  localStorage.setItem(STORAGE_KEYS.adminAuth, 'ok');
  $('adminPassword').value = '';
  applyAuthUI();
});
$('btnLogout').addEventListener('click', ()=>{ localStorage.removeItem(STORAGE_KEYS.adminAuth); applyAuthUI(); });
$('btnRefresh').addEventListener('click', loadAdmin);
$('adminSearch').addEventListener('input', applyFilters);
$('adminStatusFilter').addEventListener('change', applyFilters);
applyAuthUI();
</script>
</body>
</html>
